apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: wazuh-manager-pdb
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: wazuh-manager
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: wazuh-indexer-pdb
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: wazuh-indexer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: wazuh-analysis
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: wazuh-analysis
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: soc-default-deny
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-soc-traffic
spec:
  podSelector:
    matchLabels:
      app: wazuh-manager
  ingress:
    - from:
        - ipBlock:
            cidr: 10.0.0.0/16
      ports:
        - protocol: TCP
          port: 1514
        - protocol: TCP
          port: 1515
        - protocol: TCP
          port: 55000
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: soc-ui
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - http:
        paths:
          - path: /dashboard
            pathType: Prefix
            backend:
              service:
                name: wazuh-dashboard
                port:
                  number: 5601
          - path: /shuffle
            pathType: Prefix
            backend:
              service:
                name: shuffle
                port:
                  number: 3001
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
