apiVersion: v1
kind: Service
metadata:
  name: wazuh-dashboard
spec:
  selector:
    app: wazuh-dashboard
  ports:
    - name: http
      port: 5601
      targetPort: 5601
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wazuh-dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wazuh-dashboard
  template:
    metadata:
      labels:
        app: wazuh-dashboard
    spec:
      nodeSelector:
        workload: analysis
      containers:
        - name: dashboard
          image: wazuh/wazuh-dashboard:4.8.0
          ports:
            - containerPort: 5601
          resources:
            requests:
              cpu: "250m"
              memory: 512Mi
            limits:
              cpu: "500m"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: shuffle
spec:
  selector:
    app: shuffle
  ports:
    - name: http
      port: 3001
      targetPort: 3001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shuffle
spec:
  replicas: 2
  selector:
    matchLabels:
      app: shuffle
  template:
    metadata:
      labels:
        app: shuffle
    spec:
      nodeSelector:
        workload: analysis
      containers:
        - name: shuffle
          image: ghcr.io/frikky/shuffle:latest
          ports:
            - containerPort: 3001
          resources:
            requests:
              cpu: "250m"
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
