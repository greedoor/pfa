apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
spec:
  template:
    spec:
      containers:
        - name: prometheus
          resources:
            requests:
              cpu: "150m"
              memory: 256Mi
            limits:
              cpu: "500m"
              memory: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
spec:
  template:
    spec:
      containers:
        - name: grafana
          resources:
            requests:
              cpu: "100m"
              memory: 256Mi
            limits:
              cpu: "250m"
              memory: 512Mi
