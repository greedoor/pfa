apiVersion: apps/v1
kind: Deployment
metadata:
  name: wazuh-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wazuh-manager
  template:
    metadata:
      labels:
        app: wazuh-manager
    spec:
      nodeSelector:
        workload: analysis
      containers:
        - name: manager
          image: wazuh/wazuh-manager:4.8.0
          ports:
            - containerPort: 1514
              name: logs
            - containerPort: 1515
              name: registration
            - containerPort: 55000
              name: api
          resources:
            requests:
              cpu: "500m"
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 2Gi
          volumeMounts:
            - name: manager-data
              mountPath: /var/ossec/data
      volumes:
        - name: manager-data
          emptyDir: {}
